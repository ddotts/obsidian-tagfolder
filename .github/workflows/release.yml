name: Release Obsidian Plugin
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
        submodules: recursive
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x' # You might need to adjust this value to your own version
    # Get the version number and put it in a variable
    - name: Get Version
      id: version
      run: |
        if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        else
          echo "tag=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT
        fi
    # Build the plugin
    - name: Build
      id: build
      run: |
        npm ci
        npm run build --if-present
    # Package the required files into a zip
    - name: Package
      run: |
        plugin_id="$(node -p "require('./manifest.json').id")"
        mkdir "${plugin_id}"
        cp main.js manifest.json styles.css README.md "${plugin_id}"
        zip -r "${plugin_id}-${{ steps.version.outputs.tag }}.zip" "${plugin_id}"
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          obsidian-tagfolder-ddotts-${{ steps.version.outputs.tag }}.zip
          main.js
          manifest.json
          styles.css
        name: ${{ steps.version.outputs.tag }}
        tag_name: ${{ steps.version.outputs.tag }}
        draft: false
